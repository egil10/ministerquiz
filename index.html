<!doctype html>
<html lang="nb">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <meta
      name="description"
      content="Norsk ministerquiz med statsråder, regjeringer, partier, portretter og årstall."
    />
    <title>Ministerquiz</title>
    <link rel="preconnect" href="https://upload.wikimedia.org" crossorigin />
    <link rel="preload" href="/data/ministers.json" as="fetch" crossorigin="anonymous" />
    <link rel="stylesheet" href="/src/styles.css" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%230a0a0a'/%3E%3Ctext x='50%25' y='58%25' text-anchor='middle' font-family='Inter,sans-serif' font-size='38' font-weight='800' fill='white'%3EM%3C/text%3E%3C/svg%3E" />
    <script>
      // theme bootstrap (avoid flash)
      (function () {
        try {
          var t = localStorage.getItem("mq.theme");
          if (t === "dark" || (!t && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
            document.documentElement.setAttribute("data-theme", "dark");
          }
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <a class="skip-link" href="#stage">Hopp til quizen</a>

    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">M</span>
          <h1>Ministerquiz</h1>
        </div>
        <nav class="view-switch" role="tablist" aria-label="Visning">
          <button class="view-tab is-active" type="button" data-view="play" role="tab">Spill</button>
          <button class="view-tab" type="button" data-view="learn" role="tab">Bla</button>
          <button class="view-tab" type="button" data-view="stats" role="tab">Stats</button>
        </nav>
        <button class="theme-toggle" id="themeToggle" type="button" aria-label="Bytt tema">
          <span class="icon icon-sun" data-icon="sun" aria-hidden="true"></span>
          <span class="icon icon-moon" data-icon="moon" aria-hidden="true"></span>
        </button>
      </div>
    </header>

    <main class="app">
      <section id="stage" class="stage" aria-live="polite">
        <!-- play view -->
        <article id="playView" class="play">
          <aside class="rail">
            <div class="portrait">
              <div class="portrait-shimmer" aria-hidden="true"></div>
              <img id="portraitImg" alt="" decoding="async" />
              <div class="portrait-fallback" id="portraitFallback" aria-hidden="true"></div>
              <div class="portrait-tag" id="portraitTag" aria-hidden="true"></div>
            </div>
            <div class="rail-meta">
              <span class="rail-meta-year" id="badgeYear">…</span>
              <span class="rail-meta-streak" id="railStreak" hidden>
                <span class="icon" data-icon="flame" aria-hidden="true"></span>
                <span id="railStreakValue">0</span>
              </span>
            </div>
          </aside>

          <div class="card">
            <div class="card-head">
              <span class="kicker" id="badgeMode">Portrett</span>
              <span class="round" id="roundLabel">1 / 10</span>
            </div>
            <div class="round-progress" aria-hidden="true">
              <span id="roundFill" class="round-progress-fill"></span>
            </div>

            <h2 id="questionText" class="question">Laster quiz…</h2>
            <p id="questionHint" class="hint">&nbsp;</p>

            <div class="choices" id="choices"></div>

            <div class="answer" id="answerPanel">
              <div class="answer-body">
                <h3 id="answerTitle">&nbsp;</h3>
                <p id="answerDetail">&nbsp;</p>
                <p class="answer-links" id="answerLinks"></p>
              </div>
              <button class="primary" id="nextBtn" type="button">
                Neste
                <kbd>↵</kbd>
              </button>
            </div>
          </div>
        </article>

        <!-- learn view -->
        <section id="learnView" class="learn" hidden>
          <div class="learn-toolbar">
            <label class="search">
              <span class="icon" data-icon="search" aria-hidden="true"></span>
              <input id="learnSearch" type="search" placeholder="Søk navn, parti, post, regjering" autocomplete="off" />
            </label>
            <select class="toolbar-select" id="partyFilter">
              <option value="all">Alle parti</option>
            </select>
            <select class="toolbar-select" id="learnEra">
              <option value="all">Alle år</option>
              <option value="current">Siste 25 år</option>
              <option value="postwar">1945 →</option>
              <option value="interwar">1905–1945</option>
              <option value="union">1814–1905</option>
            </select>
            <span class="learn-count" id="learnCount">…</span>
          </div>
          <div id="learnGrid" class="learn-grid"></div>
        </section>

        <!-- stats view -->
        <section id="statsView" class="stats" hidden>
          <div class="stats-grid">
            <div class="stats-card">
              <span>Spilt</span>
              <strong id="statPlayed">0</strong>
            </div>
            <div class="stats-card">
              <span>Riktige</span>
              <strong id="statCorrect">0</strong>
            </div>
            <div class="stats-card">
              <span>Treff</span>
              <strong id="statAccuracyBig">0%</strong>
            </div>
            <div class="stats-card">
              <span>Beste streak</span>
              <strong id="statBest">0</strong>
            </div>
          </div>
          <div class="stats-block">
            <span class="stats-block-label">Per modus</span>
            <table class="mode-table" id="modeTable"></table>
          </div>
          <details class="stats-disclosure">
            <summary>Datagrunnlag</summary>
            <ul class="data-list" id="dataList"></ul>
          </details>
          <div class="stats-actions">
            <button class="ghost" id="resetProgress" type="button">Nullstill progresjon</button>
          </div>
        </section>
      </section>

      <!-- mode chips live below the card to stay out of the way -->
      <section class="controls" id="controls" aria-label="Modus">
        <div class="chip-row-list" id="modeList" role="tablist" aria-label="Modus"></div>
        <select class="era-select" id="eraSelect" aria-label="Periode">
          <option value="all">Alle år</option>
          <option value="current">Siste 25 år</option>
          <option value="postwar">1945 →</option>
          <option value="interwar">1905–1945</option>
          <option value="union">1814–1905</option>
        </select>
      </section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite" hidden></div>

    <footer class="foot">
      <details class="foot-disclosure">
        <summary>Om</summary>
        <p>
          Data fra <a href="https://www.regjeringen.no" rel="noopener" target="_blank">regjeringen.no</a> og
          <a href="https://commons.wikimedia.org" rel="noopener" target="_blank">Wikimedia Commons</a>.
          Portretter og partilogoer er lokalt cachet. Ikoner via
          <a href="https://lucide.dev" rel="noopener" target="_blank">lucide.dev</a>.
        </p>
        <p id="footStats" class="foot-stats"></p>
      </details>
    </footer>

    <script type="module" src="/src/app.js"></script>
  </body>
</html>
