<!doctype html>
<html lang="nb">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#fcfcfa" />
    <meta name="description" content="Quiz om norske statsråder, verdens flagg og verdens ledere." />
    <title>Lederquiz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" />
    <link rel="preload" href="/data/ministers.json" as="fetch" crossorigin="anonymous" />
    <link rel="preload" href="/data/world-leaders.json" as="fetch" crossorigin="anonymous" />
    <link rel="stylesheet" href="/src/styles.css" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230d9488'/%3E%3Ctext x='50%25' y='62%25' text-anchor='middle' font-family='Inter,sans-serif' font-size='34' font-weight='700' fill='white'%3EL%3C/text%3E%3C/svg%3E" />
    <script>
      (function () {
        try {
          var t = localStorage.getItem("lq.theme");
          if (t === "dark" || (!t && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
            document.documentElement.setAttribute("data-theme", "dark");
          }
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <a class="brand" href="/">
          <span class="brand-title">Lederquiz</span>
          <span class="brand-sub" id="brandSub">norge · verden</span>
        </a>
        <div class="score">
          <span><span class="score-value" id="scoreCorrect">0</span>/<span id="scoreTotal">0</span></span>
          <span class="score-sep">·</span>
          <span id="scoreStreak" title="Streak">streak 0</span>
          <div class="auto-toggle" id="autoToggle" role="radiogroup" aria-label="Auto-neste"></div>
          <button class="theme-btn" id="themeToggle" type="button" aria-label="Bytt tema">tema</button>
        </div>
      </div>
    </header>

    <main class="app">
      <section class="intro">
        <h1>Kjenner du dem igjen?</h1>
        <p>Velg et bilde, gjett rett person eller land. Bruk tastene 1–4 for å svare raskere.</p>
      </section>

      <nav class="modes" id="modes" role="tablist" aria-label="Quiz-modus"></nav>

      <div id="stage">
        <div class="loading" id="loading">laster…</div>
      </div>

      <div class="stats">
        <div class="stat">
          <div class="stat-label">Spilt</div>
          <div class="stat-value" id="statPlayed">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">Riktige</div>
          <div class="stat-value" id="statCorrect">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">Treff</div>
          <div class="stat-value" id="statAccuracy">—</div>
        </div>
        <div class="stat">
          <div class="stat-label">Beste streak</div>
          <div class="stat-value" id="statBest">0</div>
        </div>
      </div>
    </main>

    <footer class="foot">
      Data fra
      <a href="https://www.regjeringen.no" target="_blank" rel="noopener">regjeringen.no</a>
      og
      <a href="https://www.wikidata.org" target="_blank" rel="noopener">wikidata</a>.
    </footer>

    <script type="module" src="/src/app.js"></script>
  </body>
</html>
